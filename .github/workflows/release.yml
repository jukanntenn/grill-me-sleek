# =============================================================================
# 发布工作流（统一版本）
#
# 触发条件：
#   - 推送 v* tag（统一发布：GitHub Release + CLI npm + Docker）
#   - 手动触发
#
# 设计原则：
#   - 统一版本号：cli/server/web 使用同一个版本
#   - 自动从 CHANGELOG.md 提取版本
#   - 创建 GitHub Release
#   - 发布 CLI 到 npm（使用可信发布，无需 token）
#   - 发布 Docker 镜像
# =============================================================================

name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (leave empty to extract from CHANGELOG)'
        required: false

permissions:
  contents: write
  id-token: write  # npm 可信发布需要

jobs:
  # ---------------------------------------------------------------------------
  # 发布 CLI 到 npm
  # ---------------------------------------------------------------------------
  release-cli:
    name: Release CLI to npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Extract version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/v}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Version: $VERSION"

      - name: Enable corepack
        run: corepack enable

      - name: Build and publish
        run: |
          cd cli
          pnpm install --frozen-lockfile
          pnpm version ${{ steps.version.outputs.version }} --no-git-tag-version
          NODE_ENV=production pnpm run build:prod
          pnpm publish --access public --provenance --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ---------------------------------------------------------------------------
  # 创建 GitHub Release
  # ---------------------------------------------------------------------------
  release-github:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/v}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Version: $VERSION"

      - name: Extract release notes
        id: changelog
        run: |
          VERSION=${{ steps.version.outputs.version }}
          awk "/\\[${VERSION}\\]/{flag=1; next} /^## \\[/{flag=0} flag" CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "::error::CHANGELOG.md 中未找到版本 ${VERSION} 的条目"
            exit 1
          fi
          echo "path=release_notes.md" >> $GITHUB_OUTPUT

      - name: Detect pre-release
        id: prerelease
        run: |
          VERSION=${{ steps.version.outputs.version }}
          if [[ "$VERSION" == *-* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
            echo "make_latest=false" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
            echo "make_latest=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.changelog.outputs.path }}
          draft: false
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
          make_latest: ${{ steps.prerelease.outputs.make_latest }}

