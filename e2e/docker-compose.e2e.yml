# E2E 测试环境配置
# 从最新代码构建 Docker 镜像

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8443:8443"
    environment:
      - GSLEEK_BASE_URL=https://localhost:8443
      - GSLEEK_DB_PATH=/app/data/e2e-test.db
      - GSLEEK_DISABLE_RATE_LIMIT=true
      - RUST_LOG=info
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - e2e-data:/app/data
      - ./Caddyfile:/app/Caddyfile:ro
    healthcheck:
      test: ["CMD", "curl", "-fsk", "https://localhost:8443/v1/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

volumes:
  e2e-data:
